server:
  port: 8080

spring:
  application:
    name: coupon-demo

  thymeleaf:
    cache: false
    enabled: true
    encoding: UTF-8
    mode: HTML
    prefix: classpath:/templates/
    suffix: .html

  datasource:
    url: jdbc:mysql://localhost:3306/coupon_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 123456
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      filters: stat

  data:
    redis:
      host: 127.0.0.1
      port: 6379
      timeout: 3000
      password:
      lettuce:
        pool:
          max-active: 1000
          max-idle: 500
          min-idle: 100
          max-wait: 500ms

rocketmq:
  name-server: 127.0.0.1:9876
  producer:
    group: coupon-producer-group
    send-message-timeout: 3000
    retry-times-when-send-failed: 2

mybatis-plus:
  type-aliases-package: com.example.coupondemo.domain
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    default-fetch-size: 100
    default-statement-timeout: 3000
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.example.coupondemo.mapper: debug
