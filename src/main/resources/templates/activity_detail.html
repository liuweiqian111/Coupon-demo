<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>活动详情 - 优惠券领取系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f7fa;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            padding: 40px;
        }
        .back {
            color: #667eea;
            cursor: pointer;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .back:hover {
            text-decoration: underline;
        }
        .title {
            font-size: 24px;
            color: #333;
            margin-bottom: 30px;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 14px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .info-label {
            color: #666;
            font-size: 14px;
        }
        .info-value {
            color: #333;
            font-size: 14px;
            font-weight: 500;
        }
        .info-value.price {
            color: #e74c3c;
            font-size: 20px;
        }
        .btn-receive {
            width: 100%;
            padding: 14px;
            background: #667eea;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 30px;
            transition: background 0.3s;
        }
        .btn-receive:hover {
            background: #5a6fd6;
        }
        .btn-receive:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .msg {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            min-height: 20px;
        }
        .msg.success { color: #27ae60; }
        .msg.error { color: #e74c3c; }
        .loading {
            text-align: center;
            padding: 60px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container" id="container">
        <div class="loading">加载中...</div>
    </div>

    <script>
        var activityId = window.location.pathname.split('/').pop();
        var token = localStorage.getItem('token');

        if (!token) {
            alert('请先登录');
            window.location.href = '/login';
        }

        // 获取活动详情
        fetch('/api/activity/detail/' + activityId)
        .then(res => res.json())
        .then(data => {
            if (data.code !== 200) {
                document.getElementById('container').innerHTML = '<div class="loading">活动不存在</div>';
                return;
            }
            var item = data.data;
            var html = 
                '<div class="back" onclick="history.back()">← 返回列表</div>' +
                '<div class="title">' + item.title + '</div>' +
                '<div class="info-row">' +
                    '<span class="info-label">优惠金额</span>' +
                    '<span class="info-value price">¥' + item.discountAmount + '</span>' +
                '</div>' +
                '<div class="info-row">' +
                    '<span class="info-label">剩余数量</span>' +
                    '<span class="info-value">' + item.remainAmount + ' / ' + item.totalAmount + '</span>' +
                '</div>' +
                '<div class="info-row">' +
                    '<span class="info-label">开始时间</span>' +
                    '<span class="info-value">' + item.startTime.replace('T', ' ') + '</span>' +
                '</div>' +
                '<div class="info-row">' +
                    '<span class="info-label">结束时间</span>' +
                    '<span class="info-value">' + item.endTime.replace('T', ' ') + '</span>' +
                '</div>' +
                '<button class="btn-receive" id="btn" onclick="doReceive()">立即领取</button>' +
                '<div class="msg" id="msg"></div>';
            document.getElementById('container').innerHTML = html;
        })
        .catch(err => {
            document.getElementById('container').innerHTML = '<div class="loading">加载失败</div>';
        });

        function doReceive() {
            var btn = document.getElementById('btn');
            var msg = document.getElementById('msg');
            btn.disabled = true;
            btn.innerText = '领取中...';

            fetch('/coupon/receive/' + activityId, {
                method: 'POST',
                headers: { 'token': token }
            })
            .then(res => res.json())
            .then(data => {
                if (data.code === 200) {
                    msg.className = 'msg success';
                    msg.innerText = data.data;
                    btn.innerText = '已领取';
                } else {
                    msg.className = 'msg error';
                    msg.innerText = data.msg;
                    btn.disabled = false;
                    btn.innerText = '立即领取';
                }
            })
            .catch(err => {
                msg.className = 'msg error';
                msg.innerText = '网络错误';
                btn.disabled = false;
                btn.innerText = '立即领取';
            });
        }
    </script>
</body>
</html>
