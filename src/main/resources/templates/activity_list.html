<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>活动列表 - 优惠券领取系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f7fa;
            padding: 20px;
        }
        .header {
            max-width: 900px;
            margin: 0 auto 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h2 {
            color: #333;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 16px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th {
            background: #667eea;
            color: #fff;
            font-weight: 500;
        }
        tr:hover {
            background: #f8f9fa;
        }
        .btn-detail {
            padding: 6px 16px;
            background: #667eea;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-detail:hover {
            background: #5a6fd6;
        }
        .status-on {
            color: #27ae60;
            font-weight: 500;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="header">
        <h2>优惠活动列表</h2>
    </div>
    <div class="container">
        <table>
            <thead>
                <tr>
                    <th>活动名称</th>
                    <th>优惠金额</th>
                    <th>剩余数量</th>
                    <th>状态</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="list-body">
                <tr><td colspan="5" class="loading">加载中...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        fetch('/api/activity/list')
        .then(res => res.json())
        .then(data => {
            var tbody = document.getElementById('list-body');
            if (data.code !== 200 || !data.data || data.data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="loading">暂无活动</td></tr>';
                return;
            }
            var html = '';
            data.data.forEach(function(item) {
                html += '<tr>' +
                    '<td>' + item.title + '</td>' +
                    '<td>¥' + item.discountAmount + '</td>' +
                    '<td>' + item.remainAmount + '/' + item.totalAmount + '</td>' +
                    '<td class="status-on">进行中</td>' +
                    '<td><button class="btn-detail" onclick="goDetail(' + item.id + ')">查看详情</button></td>' +
                    '</tr>';
            });
            tbody.innerHTML = html;
        })
        .catch(err => {
            document.getElementById('list-body').innerHTML = 
                '<tr><td colspan="5" class="loading">加载失败</td></tr>';
        });

        function goDetail(id) {
            window.location.href = '/activity/detail/' + id;
        }
    </script>
</body>
</html>
